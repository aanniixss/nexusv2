// ═══════════ DATE ═══════════
function todayStr(){var d=new Date(),m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd);}
function dk(y,m,d){return y+'-'+(m<10?'0'+m:''+m)+'-'+(d<10?'0'+d:''+d);}
function pd(s){var p=s.split('-');return new Date(+p[0],+p[1]-1,+p[2]);}
function addD(s,n){var d=pd(s);d.setDate(d.getDate()+n);var m=d.getMonth()+1,dd=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd);}
function wkDates(ref){var d=pd(ref),day=d.getDay(),off=day===0?6:day-1,mon=new Date(d),r=[];mon.setDate(d.getDate()-off);for(var i=0;i<7;i++){var x=new Date(mon);x.setDate(mon.getDate()+i);var m=x.getMonth()+1,dd=x.getDate();r.push(x.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dd<10?'0'+dd:dd));}return r;}
function fmtLong(s){var d=pd(s),days=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],months=['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();}
function fmtS(s){var p=s.split('-'),m=['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'];return p[2]+' '+m[+p[1]-1];}
function mname(m){return['Janvier','Fevrier','Mars','Avril','Mai','Juin','Juillet','Aout','Septembre','Octobre','Novembre','Decembre'][m];}
function mshort(m){return['Jan','Fev','Mar','Avr','Mai','Jun','Jul','Aou','Sep','Oct','Nov','Dec'][m];}

function getDayData(s){if(!APP.days[s])APP.days[s]={habits:{},intention:'',reflection:'',nr:'',nn:'',ns:'',nd:''};return APP.days[s];}
function getHV(s,id){var d=getDayData(s);return d.habits[id]!==undefined?d.habits[id]:null;}
function setHV(s,id,v){getDayData(s).habits[id]=v;saveApp();}

// ═══════════ SCORES ═══════════
function dayScore(s,cat){
  var habits=APP.habits.filter(function(h){return h.on&&(cat?h.cat===cat:true);});
  if(!habits.length)return 0;
  var earned=0,total=0;
  habits.forEach(function(h){var w=h.w||5;total+=w;var v=getHV(s,h.id);
    if(h.type==='check'){if(v===true||v===1)earned+=w;}
    else if(h.type==='num'){if(v&&h.goal)earned+=w*Math.min(v/h.goal,1);else if(v&&v>0)earned+=w*0.5;}});
  return total>0?Math.round(earned/total*100):0;}
function wkScore(s,cat){var wk=wkDates(s),sc=wk.map(function(d){return dayScore(d,cat);}),a=sc.filter(function(x){return x>0;});return a.length?Math.round(a.reduce(function(a,b){return a+b;},0)/a.length):0;}
function moScore(y,m,cat){var days=new Date(y,m+1,0).getDate(),t=0,c=0;for(var d=1;d<=days;d++){var s=dayScore(dk(y,m+1,d),cat);if(s>0){t+=s;c++;}}return c?Math.round(t/c):0;}
function yrScore(y,cat){var t=0,c=0;for(var m=0;m<12;m++){var s=moScore(y,m,cat);if(s>0){t+=s;c++;}}return c?Math.round(t/c):0;}
function streak(){var n=0,d=new Date();for(var i=0;i<365;i++){var m=d.getMonth()+1,da=d.getDate();var s=d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(da<10?'0'+da:da);if(dayScore(s)>=50){n++;d.setDate(d.getDate()-1);}else break;}return n;}
function cumul(id,dates){return dates.reduce(function(s,d){return s+(parseFloat(getHV(d,id))||0);},0);}
function cumulP(id,period,ref){var dates=[],p=ref.split('-'),y=+p[0],m=+p[1]-1;
  if(period==='week')dates=wkDates(ref);
  else if(period==='month'){var dm=new Date(y,m+1,0).getDate();for(var d=1;d<=dm;d++)dates.push(dk(y,m+1,d));}
  else{for(var mo=1;mo<=12;mo++){var dM=new Date(y,mo,0).getDate();for(var d=1;d<=dM;d++)dates.push(dk(y,mo,d));}}
  return cumul(id,dates);}
function slabel(s){if(s>=90)return{l:'ELITE',c:'b-el'};if(s>=75)return{l:'EXCELLENT',c:'b-ex'};if(s>=60)return{l:'BON',c:'b-go'};if(s>=40)return{l:'MOYEN',c:'b-me'};return{l:'FAIBLE',c:'b-lo'};}
function scol(s){if(s>=90)return'var(--go)';if(s>=75)return'var(--gr)';if(s>=60)return'var(--bl)';if(s>=40)return'var(--or)';return s>0?'var(--re)':'var(--tx3)';}

function ring(s,color,size){size=size||68;var r=(size/2)-6,circ=2*Math.PI*r,dash=(s/100)*circ,c=color||scol(s),h=size/2;
  return '<div style="position:relative;width:'+size+'px;height:'+size+'px;flex-shrink:0">'+

    '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:'+Math.round(size*.22)+'px;font-weight:800;font-family:monospace;color:'+c+'">'+s+'</div><div style="font-size:8px;color:var(--tx3)">%</div></div></div>';}
function pb(v,max,color){var pct=max>0?Math.min(Math.round(v/max*100),100):0;return '<div class="pbar"><div class="pf" style="width:'+pct+'%;background:'+(color||'var(--ac)')+'"></div></div>';}

function nin(id,s,h){var v=parseFloat(getHV(s,id))||0;

function wkstrip(s,fn){var wk=wkDates(s),today=todayStr(),days=['L','M','M','J','V','S','D'],h='<div class="wstrip">';
  wk.forEach(function(d,i){var sc=dayScore(d),isSel=d===s,isT=d===today,fut=d>today;

  return h+'</div>';}

function oCard(o){
    var catC={religion:'var(--go)',nutrition:'var(--gr)',sport:'var(--bl)',dev:'var(--pu)'};
    var freqLabels={daily:'Quotidien',weekly:'Hebdo',monthly:'Mensuel',yearly:'Annuel',custom:'Libre'};

    var dlTxt=dl!==null?(' <span style="font-size:9px;color:'+(dl<0?'var(--re)':dl<=3?'var(--or)':'var(--tx3)')+'">'+( dl<0?'Expire':dl===0?'Auj.':dl+' j.')+'</span>'):'';
    var prioC={high:'var(--re)',medium:'var(--or)',low:'var(--tx3)'}[o.prio]||'var(--tx3)';

      '<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:5px">'+
      '<div style="flex:1"><div style="font-size:12px;font-weight:600">'+esc(o.name)+'</div>'+
      '<div style="display:flex;gap:3px;margin-top:3px;flex-wrap:wrap">'+
      '<span class="badge" style="background:rgba(255,255,255,.06);color:'+cc+'">'+o.cat+'</span>'+
      '<span class="badge" style="background:rgba(255,255,255,.06);color:var(--tx3)">'+freqLabels[o.freq]+'</span>'+
      (o.end?'<span class="badge" style="background:rgba(255,255,255,.06);color:var(--tx3)">'+esc(o.end)+dlTxt+'</span>':'')+
      '</div>'+
      '<div style="font-size:9px;color:var(--tx3);margin-top:2px">'+o.progress+'/'+o.target+' '+esc(o.unit)+'</div>'+
      '</div>'+
      '<div style="font-size:17px;font-weight:800;font-family:monospace;color:'+scol(pct)+'">'+pct+'%</div></div>'+
      pb(o.progress,o.target,cc)+
      '<div style="display:flex;align-items:center;gap:4px;margin-top:6px">'+
      '<span class="badge" style="background:'+statusBg+';color:'+statusColor+'">'+( o.status==='active'?'EN COURS':o.status==='done'?'ATTEINT':'EN RETARD')+'</span>'+
      '<button class="btn bg2 bsm" style="margin-left:auto" data-oid="'+eid+'" onclick="objProg(this)">+ Prog.</button>'+
      '<button class="btn bs bsm" data-oid="'+eid+'" onclick="objEdit(this)">&#9998;</button>'+
      '</div>'+
      (o.notes?'<div style="font-size:9px;color:var(--tx3);margin-top:4px;font-style:italic">'+esc(o.notes)+'</div>':'')+
      '</div>';}

function renderObj(){
  var catC={religion:'var(--go)',nutrition:'var(--gr)',sport:'var(--bl)',dev:'var(--pu)'};
  var freqLabels={daily:'Quotidien',weekly:'Hebdo',monthly:'Mensuel',yearly:'Annuel',custom:'Libre'};
  var allO=APP.obj;
  var filtered=OBJ_F==='all'?allO:allO.filter(function(o){return o.freq===OBJ_F;});

  tabs+='</div>';



  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
    '<div><div style="font-size:17px;font-weight:800">&#127919; Objectifs</div>'+
    '<div style="font-size:10px;color:var(--tx2)">'+allActive+' actif - '+allDone+' atteint - '+allLate+' retard</div></div>'+
    '<button class="btn bp" onclick="objAdd()">+ Objectif</button></div>';
  html+='<div class="g g4 mb2">'+ms(allO.length,'Total','var(--tx)')+ms(allActive,'En cours','var(--or)')+ms(allDone,'Atteints','var(--gr)')+ms(allLate,'En retard','var(--re)')+'</div>';
  html+=tabs;
  if(active.length)html+='<div class="sh">En cours ('+active.length+')</div>'+active.map(oCard).join('');
  if(done.length)html+='<div class="sh">Atteints</div>'+done.map(oCard).join('');
  if(late.length)html+='<div class="sh">En retard</div>'+late.map(oCard).join('');
  if(!filtered.length)html+='<div style="text-align:center;padding:28px;color:var(--tx3)"><div style="font-size:32px;margin-bottom:8px">&#127919;</div><p>Aucun objectif</p></div>';

var syncTimeout = null;
var syncStatus = 'idle'; // idle, syncing, ok, error

function sbHeaders(){
  return {
    'Content-Type': 'application/json',
    'apikey': SB_KEY,
    'Authorization': 'Bearer ' + SB_KEY
  };
}

function setSyncStatus(status){
  syncStatus = status;
  var el = document.getElementById('sync-indicator');
  if(!el) return;
  var states = {
    idle: {text:'', bg:'transparent'},
    syncing: {text:'&#8635; Sync...', bg:'var(--or)'},
    ok: {text:'&#10003; Sync', bg:'var(--gr)'},
    error: {text:'&#9888; Sync', bg:'var(--re)'}
  };
  var st = states[status] || states.idle;
  el.innerHTML = st.text;
  el.style.background = st.bg;
}

function syncToCloud(){
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(function(){
    setSyncStatus('syncing');
    var body = JSON.stringify({id:'main', data: APP, updated_at: new Date().toISOString()});
    fetch(SB_URL + '/rest/v1/nexus_data?id=eq.main', {
      method: 'PATCH',
      headers: sbHeaders(),
      body: body
    }).then(function(r){
      if(r.ok){ setSyncStatus('ok'); setTimeout(function(){setSyncStatus('idle');}, 2000); }
      else{ setSyncStatus('error'); }
    }).catch(function(){ setSyncStatus('error'); });
  }, 1500);
}

function syncFromCloud(callback){
  setSyncStatus('syncing');
  fetch(SB_URL + '/rest/v1/nexus_data?id=eq.main&select=data', {
    method: 'GET',
    headers: sbHeaders()
  }).then(function(r){ return r.json(); })
  .then(function(rows){
    if(rows && rows.length > 0 && rows[0].data && Object.keys(rows[0].data).length > 0){
      var remote = rows[0].data;
      if(remote.habits) APP.habits = remote.habits;
      if(remote.obj) APP.obj = remote.obj;
      if(remote.settings) APP.settings = remote.settings;
      if(remote.days) APP.days = remote.days;
      if(remote.years) APP.years = remote.years;
      saveApp();
      setSyncStatus('ok');
      setTimeout(function(){setSyncStatus('idle');}, 2000);
      if(callback) callback();
    } else {
      // Cloud empty, push local data
      syncToCloud();
      if(callback) callback();
    }
  }).catch(function(){
    setSyncStatus('error');
    if(callback) callback();
  });
}

// Override saveApp to also sync
function saveApp(){
  _saveLocal();
  syncToCloud();
}
